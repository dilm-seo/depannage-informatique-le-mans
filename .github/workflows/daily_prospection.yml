name: Fix72 — Prospection Journalière Autonome

on:
  schedule:
    # Lundi–Samedi à 8h00 heure française (7h UTC hiver, 6h UTC été)
    - cron: '0 7 * * 1-6'
  workflow_dispatch:  # Déclenchement manuel depuis GitHub

jobs:
  prospection:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write  # nécessaire pour commit/push du CRM

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r agents/requirements.txt

      - name: Test connectivité API Anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import anthropic, sys
          print(f"SDK version : {anthropic.__version__}")
          if not __import__('os').environ.get('ANTHROPIC_API_KEY'):
              print("ERREUR : ANTHROPIC_API_KEY non définie dans les secrets GitHub")
              sys.exit(1)
          try:
              client = anthropic.Anthropic()
              msg = client.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=10,
                  messages=[{"role": "user", "content": "Dis OK"}]
              )
              print(f"API OK — réponse : {msg.content[0].text}")
          except anthropic.AuthenticationError:
              print("ERREUR : Clé API invalide — vérifiez ANTHROPIC_API_KEY dans les secrets")
              sys.exit(1)
          except Exception as e:
              print(f"ERREUR connexion : {type(e).__name__}: {e}")
              sys.exit(1)
          EOF

      - name: Lancement du système d'agents Fix72
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          python -m agents.main

      - name: Commit et push du CRM mis à jour
        if: always()
        run: |
          git config user.name "Fix72 AI Agents"
          git config user.email "aubryetienne@icloud.com"
          git add agents/data/crm.json
          if git diff --staged --quiet; then
            echo "CRM inchangé — aucun commit nécessaire"
          else
            git commit -m "chore: mise à jour CRM — session $(date +%Y-%m-%d)"
            git push origin HEAD
          fi

      - name: Sauvegarde du rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-${{ github.run_number }}-${{ github.run_attempt }}
          path: agents/rapports/
          retention-days: 30
